<!DOCTYPE html>
<html>
<head>
    <title>Socket.IO Test</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>Socket.IO Connection Test</h1>
    <div id="status" style="padding: 20px; font-size: 18px;">
        <p>Status: <span id="connection-status" style="color: orange;">Connecting...</span></p>
        <p>Socket ID: <span id="socket-id">-</span></p>
    </div>
    
    <script>
        const socket = io('http://localhost:5001', {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionDelay: 1000,
        });

        socket.on('connect', () => {
            document.getElementById('connection-status').style.color = 'green';
            document.getElementById('connection-status').textContent = 'Connected ✅';
            document.getElementById('socket-id').textContent = socket.id;
            console.log('✅ Connected:', socket.id);
        });

        socket.on('disconnect', () => {
            document.getElementById('connection-status').style.color = 'red';
            document.getElementById('connection-status').textContent = 'Disconnected ❌';
            console.log('❌ Disconnected');
        });

        socket.on('connect_error', (error) => {
            document.getElementById('connection-status').style.color = 'red';
            document.getElementById('connection-status').textContent = 'Connection Error ❌';
            console.error('❌ Connection error:', error);
        });
    </script>
</body>
</html>
